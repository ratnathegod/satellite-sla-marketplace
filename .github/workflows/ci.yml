name: CI

on:
  push:
  pull_request:

jobs:
  contracts:
    name: Contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Initialize Foundry dependencies
        run: |
          git submodule update --init --recursive contracts/lib/openzeppelin-contracts
          test -f contracts/lib/openzeppelin-contracts/contracts/token/ERC20/ERC20.sol
          test -f contracts/lib/openzeppelin-contracts/lib/forge-std/src/Test.sol

      - name: Forge build
        run: |
          cd contracts
          forge build

      - name: Forge tests
        run: |
          cd contracts
          forge test --offline

  verifier:
    name: Verifier
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: verifier/go.sum

      - name: Verify Go modules
        run: |
          cd verifier
          go mod verify

      - name: Go tests
        run: |
          cd verifier
          go test ./...

  web-new:
    name: Web New
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm -C web-new exec playwright install --with-deps chromium

      - name: Frontend tests
        run: pnpm -C web-new test

      - name: Browser smoke tests
        run: pnpm -C web-new e2e

      - name: Frontend build
        run: pnpm -C web-new build

      - name: Install ripgrep if needed
        run: |
          if ! command -v rg >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y ripgrep
          fi

      - name: Stale API/name scan
        run: |
          ! rg "releasePayment|disputeTask|taskCount|getTaskProof|DisputeResolved" web-new

  docker-config:
    name: Local Demo Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Static local demo smoke
        run: scripts/check-local-demo.sh --static
