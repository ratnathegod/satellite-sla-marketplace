<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Satellite dish -->
  <circle cx="100" cy="100" r="60" stroke="#3b82f6" stroke-width="4" fill="none"/>
  <circle cx="100" cy="100" r="40" stroke="#3b82f6" stroke-width="3" fill="none"/>
  <circle cx="100" cy="100" r="20" stroke="#3b82f6" stroke-width="2" fill="#3b82f6" opacity="0.3"/>
  
  <!-- Signal waves -->
  <path d="M 100 40 Q 80 30, 70 20" stroke="#60a5fa" stroke-width="2" fill="none" opacity="0.7"/>
  <path d="M 100 40 Q 100 20, 100 10" stroke="#60a5fa" stroke-width="2" fill="none" opacity="0.7"/>
  <path d="M 100 40 Q 120 30, 130 20" stroke="#60a5fa" stroke-width="2" fill="none" opacity="0.7"/>
  
  <!-- Center dot -->
  <circle cx="100" cy="100" r="5" fill="#3b82f6"/>
  
  <!-- Text -->
  <text x="100" y="180" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#3b82f6" text-anchor="middle">
    SatSLA
  </text>
</svg>
