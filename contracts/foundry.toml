[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/openzeppelin-contracts/lib/forge-std/src/"
]

solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false

# Allow deployment/export scripts to write canonical frontend artifacts.
fs_permissions = [{ access = "read-write", path = "../web-new/public/abi" }]

[rpc_endpoints]
localhost = "http://localhost:8545"

[etherscan]
mainnet = { key = "${ETHERSCAN_API_KEY}" }
sepolia = { key = "${ETHERSCAN_API_KEY}" }
